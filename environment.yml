# MapFree Engine — single conda environment (Windows/Linux/macOS)
# Install: conda env create -f environment.yml && conda activate mapfree_engine && pip install -e .
name: mapfree_engine
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  # Geospatial
  - gdal
  - pdal
  # Image / scientific
  - pillow
  - numpy
  - scipy
  # Qt GUI: PySide6 from conda-forge to avoid DLL conflicts with COLMAP/GDAL (do not install via pip)
  - conda-forge::pyside6
  # Config / runtime
  - pyyaml
  - psutil
  - matplotlib
  # COLMAP / OpenMVS: install separately (installer, choco, or manual)
  # MapFree: install from repo with  pip install -e .  (see install_windows.bat / README)
  - pip:
    - exifread>=3.0.0
    - opencv-python
    - tqdm
    - pyqtgraph>=0.13.0