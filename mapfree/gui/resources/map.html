<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>MapFree Map</title>
<link rel="stylesheet" href="leaflet/leaflet.css"/>
<style>
html, body, #map { height: 100%; margin: 0; }
#map { background: #fff; }
</style>
</head>
<body>
<div id="map"></div>

<script src="leaflet/leaflet.js"></script>
<script>

var map = L.map('map', {
  zoomControl: true,
  attributionControl: false
}).setView([0, 0], 2);

// No online tile layer — offline/production. Map shows white background.
// Future: add optional local tile or basemap here via setBaseLayer.
var layers = {};

function addGeoJSONLayer(name, geojson) {
  if (!geojson || typeof geojson !== 'object') {
    return;
  }
  if (geojson.type === 'FeatureCollection' && !geojson.features) {
    geojson.features = [];
  }
  if (geojson.type !== 'FeatureCollection' && geojson.type !== 'Feature' && geojson.type !== 'GeometryCollection') {
    geojson = { type: 'FeatureCollection', features: [] };
  }

  if (layers[name]) {
    map.removeLayer(layers[name]);
    layers[name] = null;
  }

  layers[name] = L.geoJSON(geojson, {
    pointToLayer: function (feature, latlng) {
      return L.circleMarker(latlng, {
        radius: 5,
        color: 'blue',
        fillColor: 'blue',
        fillOpacity: 0.7
      });
    }
  }).addTo(map);

  try {
    var b = layers[name].getBounds();
    if (b && b.isValid && b.isValid()) {
      map.fitBounds(b);
    }
  } catch (e) {}
}

function setLayerVisibility(name, visible) {
  var layer = layers[name];
  if (layer) {
    if (visible) {
      map.addLayer(layer);
    } else {
      map.removeLayer(layer);
    }
  }
}

function setBaseLayer(name) {
  // Offline: no online tiles. Dummy for API; future extensible for local tiles.
  (function noop() {})();
}

function clearAllLayers() {
  var names = Object.keys(layers);
  for (var i = 0; i < names.length; i++) {
    var layer = layers[names[i]];
    if (layer) {
      map.removeLayer(layer);
    }
    layers[names[i]] = null;
  }
  layers = {};
}

window.mapReady = true;

</script>
</body>
</html>
